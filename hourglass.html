<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Aclonica&display=swap" rel="stylesheet">
  <title>Hourglass</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f6f6f6;
      font-family: 'Aclonica', sans-serif;
      color: #000;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      padding: 28px 28px 48px;
    }

    .topbar {
      display: flex;
      margin-bottom: 20px;
    }

    .back-link {
      text-decoration: none;
      color: #000;
      font-size: 0.95rem;
      opacity: 0.7;
      transition: opacity 0.2s ease;
    }

    .back-link:hover {
      opacity: 1;
    }

    .page-title {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.5rem);
      text-align: center;
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .content {
      width: min(980px, 100%);
      margin: 40px auto 0;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 40px;
      justify-items: center;
      align-items: start;
    }

    .gif-card {
      width: 100%;
      max-width: 340px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      text-align: center;
    }

    .gif-frame {
      width: 100%;
      aspect-ratio: 2 / 3;
      border-radius: 24px;
      overflow: hidden;
      background: #cddde0;
    }

    .gif-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .label-box {
      min-width: 180px;
      padding: 16px 20px;
      border-radius: 24px;
      background: #cddde0;
      text-align: center;
      font-size: 1rem;
      line-height: 1.2;
    }

    .label-box p {
      display: block;
      margin-top: 6px;
      font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
      font-size: 0.85rem;
      opacity: 0.7;
      line-height: 1.35;
    }

    @media (max-width: 720px) {
      .content {
        grid-template-columns: 1fr;
        gap: 34px;
      }

      .gif-card {
        width: min(360px, 100%);
      }
    }

    @media (max-width: 520px) {
      .page {
        padding: 18px 16px 36px;
      }

      .page-title {
        font-size: 2rem;
      }

      .subtitle {
        font-size: 0.9rem;
        padding: 0 8px;
      }

      .label-box {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="topbar">
      <a class="back-link" href="index.html">← back</a>
    </div>

    <h1 class="page-title">Hourglass</h1>

    <section class="content">
      <article class="gif-card">
        <div class="gif-frame">
          <img src="hourglass/hover.gif" alt="Hourglass hover interaction" />
        </div>
        <div class="label-box">
          Hover
          <p>Cursor enters the component</p>
        </div>
      </article>

      <article class="gif-card">
        <div class="gif-frame">
          <img src="hourglass/play.gif" alt="Hourglass play interaction" />
        </div>
        <div class="label-box">
          Play
          <p>Click to start the audio</p>
        </div>
      </article>
    </section>
  </main>
</body>
</html>
